<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 工程筆記</title>
    <style>
      html {
        background: radial-gradient(circle at top left, rgba(232, 220, 199, 0.6), transparent 32%),
          linear-gradient(180deg, #d4b895 0%, #e8dcc7 100%);
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", "Helvetica Neue", "Segoe UI", sans-serif;
        color: #3e3428;
      }

      .boot {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .boot__card {
        width: min(100%, 420px);
        padding: 24px;
        border-radius: 28px;
        border: 1px solid rgba(96, 108, 56, 0.16);
        background: rgba(232, 220, 199, 0.78);
        box-shadow: 0 18px 40px rgba(96, 108, 56, 0.14);
        backdrop-filter: blur(16px);
      }

      .boot__title {
        margin: 0;
        font-size: 1.4rem;
        font-weight: 700;
        letter-spacing: -0.03em;
      }

      .boot__text {
        margin: 10px 0 0;
        color: #7f7161;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot">
        <div class="boot__card">
          <h1 class="boot__title">AI 工程筆記</h1>
          <p class="boot__text">正在載入前端應用程式...</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
