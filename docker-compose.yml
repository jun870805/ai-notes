services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ai-notes-db
    environment:
      POSTGRES_DB: ai_notes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ai_notes_db_data:/var/lib/postgresql/data
      - ./infra/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_notes"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  server:
    build:
      context: ./server
    container_name: ai-notes-server
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/ai_notes
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-2}
      GEMINI_CHAT_MODEL: ${GEMINI_CHAT_MODEL:-gemini-3.5-flash}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  ai_notes_db_data:
